<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Txn Vault | Batch Core</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --neon-blue: #00d2ff; --neon-purple: #9d50bb; --neon-green: #39ff14;
            --neon-red: #ff3131; --bg-dark: #0f172a; --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; 
            align-items: center; padding: 20px; background: var(--bg-dark); color: #e2e8f0; 
            margin: 0; min-height: 85vh;
        }
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); width: 100%; max-width: 450px; text-align: center; 
        }
        h3 { 
            margin: 0; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .preview-container { position: relative; margin-top: 20px; display: none; overflow: hidden; border-radius: 16px; border: 2px solid var(--neon-blue); }
        #preview { width: 100%; display: block; }
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2s linear infinite; z-index: 5;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        #status-container { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        #status { font-size: 0.8rem; color: #94a3b8; font-family: 'Courier New', monospace; text-transform: uppercase; }
        
        /* HEADER RESTRUCTURE */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; width: 85%; max-width: 450px; }
        .btn-clear { background: transparent; color: #f87171; border: 1px solid #f87171; padding: 4px 12px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; margin-left: auto; }
        
        #history-list { width: 100%; max-width: 450px; margin-top: 15px; }
        .txn-item { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; 
            padding: 12px; cursor: pointer; position: relative;
        }
        .txn-item.in { border-left: 4px solid var(--neon-green); }
        .txn-item.out { border-left: 4px solid var(--neon-red); }
        .txn-thumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .txn-brief { flex: 1; text-align: left; font-size: 0.8rem; color: #cbd5e1; font-family: monospace; overflow: hidden; }
        .btn-delete { color: #64748b; font-size: 1.2rem; padding: 10px; cursor: pointer; }
        
        #modal { 
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); 
            z-index: 1000; flex-direction: column; overflow-y: auto; align-items: center; justify-content: flex-start;
        }
        #modal-img { width: auto; max-width: 90%; max-height: 45vh; margin-top: 60px; border-radius: 16px; border: 2px solid var(--neon-blue); }
        #modal-data { 
            padding: 25px; font-family: 'Courier New', monospace; font-size: 0.9rem; color: var(--neon-blue);
            background: rgba(255,255,255,0.03); margin: 20px; border-radius: 12px;
            cursor: pointer; width: 85%; max-width: 400px; border: 1px solid var(--glass-border);
        }
        .close-btn { position: fixed; top: 20px; right: 25px; font-size: 2.5rem; color: white; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

<div class="card">
    <h3>Data Core</h3>
    <div id="status-container">
        <span id="status">System Ready</span>
    </div>
    
    <div class="preview-container" id="p-cont">
        <div class="scan-line" id="scan-bar"></div>
        <img id="preview" src="" alt="Syncing...">
    </div>

    <div class="history-header">
        <h4 style="margin:0; font-size: 0.8rem; color: #64748b; letter-spacing: 1px;">DAILY CACHE</h4>
        <button class="btn-clear" onclick="clearHistory()">PURGE ALL</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="" alt="View">
    <div id="modal-data" onclick="copyData(event)"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }

    const DB_NAME = "TxnVaultDB";
    const STORE_NAME = "transactions";
    const endpoints = {
        gemini: "https://script.google.com/macros/s/AKfycbyJUcI7u2YjRFzpemfGxXODskItJ-i6Eaz8HKfEF2b5qD2-9dZ2GtEsDmHzt6IaLtDY/exec",
        groq: "https://script.google.com/macros/s/AKfycbx7CrlFktwGnHXRvdcovoXrZAjEGlg5axKnK5a7udfT-NdRwLcQ1xyqOsJ7vW7PUyPj3A/exec"
    };

    const initDB = () => new Promise(res => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => res(e.target.result);
    });

    async function performHousekeeping() {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => {
            const currentISTDate = new Date().toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
            req.result.forEach(item => {
                const itemDate = new Date(item.timestamp).toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
                if (itemDate !== currentISTDate) store.delete(item.id);
            });
            renderHistory();
        };
    }

    async function saveTxn(blob, text, direction) {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).add({ blob, text, direction, timestamp: Date.now() });
        renderHistory();
    }

    async function renderHistory() {
        const db = await initDB();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = () => {
            req.result.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = `txn-item ${item.direction === "IN" ? "in" : "out"}`;
                const url = URL.createObjectURL(item.blob);
                div.onclick = () => openModal(url, item.text);
                div.innerHTML = `<img src="${url}" class="txn-thumb"><div class="txn-brief">${item.text.split('\n')[0]}<br><span style="font-size:0.7rem; color:#64748b">${item.text.split('\n')[4]}</span></div><div class="btn-delete" onclick="deleteTxn(${item.id}, event)">&times;</div>`;
                list.appendChild(div);
            });
        };
    }

    function openModal(imgUrl, fullText) {
        document.getElementById('modal-img').src = imgUrl;
        document.getElementById('modal-data').innerText = fullText;
        document.getElementById('modal').style.display = "flex";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    function copyData(event) {
        event.stopPropagation();
        navigator.clipboard.writeText(document.getElementById('modal-data').innerText);
        const status = document.getElementById('status');
        status.innerText = "COPIED TO CLIPBOARD";
        setTimeout(() => status.innerText = "System Ready", 1500);
    }

    // --- BATCH PROCESSING LOGIC ---
    async function processQueue(blobs) {
        const status = document.getElementById('status');
        const preview = document.getElementById('preview');
        const pCont = document.getElementById('p-cont');
        
        for (let i = 0; i < blobs.length; i++) {
            const blob = blobs[i];
            status.innerText = `PROCESSING ${i + 1}/${blobs.length}...`;
            
            pCont.style.display = 'block';
            preview.src = URL.createObjectURL(blob);

            try {
                const base64 = await new Promise(res => {
                    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob);
                });

                let success = false;
                for (let model of ['gemini', 'groq']) {
                    status.innerText = `[${i+1}/${blobs.length}] ${model.toUpperCase()} EXTRACTING...`;
                    const resp = await fetch(endpoints[model], { method: 'POST', body: JSON.stringify({ image: base64 })});
                    const res = await resp.json();
                    
                    if (res.status === "success") {
                        const d = res.data;
                        const formatted = `📱 App: ${d.app}\n👤 Name: ${d.name}\n🆔 ID: ${d.txnId}\n📝 Msg: ${d.imageMessage}\n💰 Amount: ${d.amount}\n📊 Direction: ${d.direction === "IN" ? "🟢 IN" : "🔴 OUT"}\n⇄ Type: ${d.type}\n🏢 Account: ${d.account}\n🏷️ Category: ${d.category}\n🔗 Ref: ${d.refId}`;
                        await saveTxn(blob, formatted, d.direction);
                        success = true;
                        break;
                    }
                }
                if (!success) status.innerText = `FAILED ON ITEM ${i+1}`;
            } catch (e) { status.innerText = "CORE ERROR"; }
        }
        status.innerText = "BATCH COMPLETE";
        setTimeout(() => pCont.style.display = 'none', 3000);
    }

    window.addEventListener('load', async () => {
        await performHousekeeping();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const keys = await cache.keys();
            const blobs = [];
            for (let key of keys) {
                const resp = await cache.match(key);
                blobs.push(await resp.blob());
                await cache.delete(key);
            }
            if (blobs.length > 0) processQueue(blobs);
        }
    });

    async function deleteTxn(id, e) { e.stopPropagation(); if(confirm("Delete?")) { const db = await initDB(); db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(id); renderHistory(); } }
    async function clearHistory() { if(confirm("Purge all?")) { const db = await initDB(); db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).clear(); renderHistory(); } }
</script>
</body>
</html>
