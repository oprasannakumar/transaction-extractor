<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Txn Vault | Neon Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; background: var(--bg-dark); color: #e2e8f0; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .card { 
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); width: 100%; max-width: 450px; text-align: center; 
        }

        h3 { 
            margin: 0 0 20px 0; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .mode-selector {
            display: flex; background: rgba(255,255,255,0.05); padding: 4px;
            border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: #64748b; font-size: 0.75rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; border-radius: 8px; text-transform: uppercase;
        }
        .mode-btn.active { background: var(--neon-blue); color: white; box-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }

        #extract-all-btn {
            display: none; width: 100%; padding: 14px; margin-bottom: 15px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            border: none; border-radius: 12px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        .preview-container { 
            position: relative; margin-top: 10px; display: none; overflow: hidden; 
            border-radius: 16px; border: 2px solid var(--neon-blue);
        }
        #preview { width: 100%; display: block; }
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2s linear infinite; z-index: 5;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        #status { font-size: 0.8rem; color: #94a3b8; font-family: monospace; margin: 15px 0; }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; width: 100%; max-width: 450px; }
        #history-list { width: 100%; max-width: 450px; margin-top: 15px; overflow-x: hidden; }
        
        .txn-item { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; 
            padding: 12px; cursor: pointer; transition: transform 0.1s linear, opacity 0.3s ease;
            user-select: none; touch-action: pan-y; position: relative; will-change: transform;
        }
        .txn-item.pending { border-left: 4px solid var(--neon-purple); opacity: 0.7; }
        .txn-item.in { border-left: 4px solid var(--neon-green); }
        .txn-item.out { border-left: 4px solid var(--neon-red); }
        
        .txn-thumb { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; margin-right: 15px; pointer-events: none; }
        .txn-brief { flex: 1; text-align: left; font-family: monospace; display: flex; flex-direction: column; overflow: hidden; pointer-events: none; }
        .txn-title { font-size: 0.85rem; color: #e2e8f0; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .txn-time { font-size: 0.65rem; color: #94a3b8; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

        #modal { 
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); 
            z-index: 1000; flex-direction: column; overflow-y: auto; align-items: center; padding-top: 60px;
        }
        #modal-img { max-width: 90%; border-radius: 16px; border: 2px solid var(--neon-blue); }
        #modal-data { padding: 30px; color: var(--neon-blue); font-family: monospace; width: 85%; line-height: 1.6; white-space: pre-wrap; }
        .close-btn { position: fixed; top: 20px; right: 25px; font-size: 2.5rem; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>Data Core</h3>
    
    <div class="mode-selector">
        <button class="mode-btn" id="btn-standard" onclick="setMode('standard')">Standard</button>
        <button class="mode-btn" id="btn-batch" onclick="setMode('batch')">Batch</button>
    </div>

    <button id="extract-all-btn" onclick="processBatchQueue()">Extract All Pending</button>

    <div id="status">System Online</div>
    
    <div id="p-cont" class="preview-container">
        <div class="scan-line"></div>
        <img id="preview" src="" alt="Syncing...">
    </div>

    <div class="history-header">
        <h4 style="margin:0; font-size: 0.8rem; color: #64748b; letter-spacing: 1px;">CACHE</h4>
        <button style="background:none; border:1px solid #f87171; color:#f87171; padding:4px 8px; border-radius:6px; font-size:0.6rem; cursor:pointer;" onclick="clearHistory()">PURGE ALL</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="modal" onclick="closeModal()">
    <span class="close-btn">&times;</span>
    <img id="modal-img" src="">
    <div id="modal-data"></div>
</div>

<script>
    const DB_NAME = "TxnVaultDB";
    const STORE_NAME = "transactions";
    const endpoints = {
        gemini: "https://script.google.com/macros/s/AKfycbyJUcI7u2YjRFzpemfGxXODskItJ-i6Eaz8HKfEF2b5qD2-9dZ2GtEsDmHzt6IaLtDY/exec",
        groq: "https://script.google.com/macros/s/AKfycbx7CrlFktwGnHXRvdcovoXrZAjEGlg5axKnK5a7udfT-NdRwLcQ1xyqOsJ7vW7PUyPj3A/exec"
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    const initDB = () => new Promise(res => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => res(e.target.result);
    });

    function setMode(mode) {
        localStorage.setItem('txnVaultMode', mode);
        updateModeUI();
    }

    function updateModeUI() {
        const mode = localStorage.getItem('txnVaultMode') || 'standard';
        document.getElementById('btn-standard').classList.toggle('active', mode === 'standard');
        document.getElementById('btn-batch').classList.toggle('active', mode === 'batch');
        checkPending();
    }

    async function checkPending() {
        const db = await initDB();
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = () => {
            const hasPending = req.result.some(i => i.status === 'pending');
            document.getElementById('extract-all-btn').style.display = hasPending ? 'block' : 'none';
        };
    }

    async function runExtraction(blob) {
        const start = Date.now();
        try {
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob);
            });
            for (let model of ['gemini', 'groq']) {
                document.getElementById('status').innerText = `SYNCING VIA ${model.toUpperCase()}...`;
                const resp = await fetch(endpoints[model], { method: 'POST', body: JSON.stringify({ image: base64 })});
                const res = await resp.json();
                if (res.status === "success") {
                    const duration = ((Date.now() - start) / 1000).toFixed(2);
                    const d = res.data;
                    return {
                        duration,
                        direction: d.direction,
                        formatted: `📱 App: ${d.app}\n👤 Name: ${d.name}\n🆔 ID: ${d.txnId}\n📝 Msg: ${d.imageMessage}\n💰 Amount: ${d.amount}\n📊 Direction: ${d.direction === "IN" ? "🟢 IN" : "🔴 OUT"}\n⇄ Type: ${d.type}\n🏢 Account: ${d.account}\n🏷️ Category: ${d.category}\n🔗 Ref: ${d.refId}`
                    };
                }
            }
        } catch (e) { return null; }
    }

    async function saveTxn(blob, text, direction, status = 'success', duration = null, shouldRender = true) {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        await tx.objectStore(STORE_NAME).add({ blob, text, direction, status, duration, timestamp: Date.now() });
        if (shouldRender) { renderHistory(); checkPending(); }
    }

    async function renderHistory() {
        const db = await initDB();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        
        req.onsuccess = () => {
            req.result.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = `txn-item ${item.status === 'pending' ? 'pending' : (item.direction === "IN" ? "in" : "out")}`;
                const url = URL.createObjectURL(item.blob);
                
                div.onclick = (e) => {
                    // Only open modal if we didn't just perform a swipe
                    if (!div.dataset.swiped) openModal(url, item.status === 'pending' ? "--- PENDING ---" : item.text);
                };

                // --- SMOOTH SWIPE-TO-MOVE LOGIC ---
                let startX = 0;
                let currentX = 0;

                div.addEventListener('touchstart', e => {
                    startX = e.touches[0].clientX;
                    div.style.transition = "none"; // Remove transitions while tracking finger
                    div.dataset.swiped = ""; 
                }, {passive: true});

                div.addEventListener('touchmove', e => {
                    currentX = e.touches[0].clientX;
                    const diffX = currentX - startX;
                    
                    if (diffX < 0) { // Only track left swipes
                        const move = Math.max(diffX, -200); // Cap the visual movement
                        div.style.transform = `translateX(${move}px)`;
                        if (Math.abs(diffX) > 10) div.dataset.swiped = "true"; // Flag to prevent accidental click
                    }
                }, {passive: true});

                div.addEventListener('touchend', e => {
                    const diffX = e.changedTouches[0].clientX - startX;
                    div.style.transition = "transform 0.3s ease, opacity 0.3s ease";
                    
                    if (diffX < -120) { // Threshold reached
                        handleSwipeDelete(div, item.id);
                    } else {
                        // Snap back
                        div.style.transform = "translateX(0)";
                        setTimeout(() => div.dataset.swiped = "", 300);
                    }
                }, {passive: true});

                const brief = item.status === 'pending' ? '[PENDING EXTRACTION]' : item.text.split('\n')[0];
                const timeTag = item.duration ? `<span class="txn-time">⏱️ ${item.duration}s</span>` : "";

                div.innerHTML = `
                    <img src="${url}" class="txn-thumb">
                    <div class="txn-brief">
                        <span class="txn-title">${brief}</span>
                        ${timeTag}
                    </div>
                `;
                list.appendChild(div);
            });
        };
    }

    async function handleSwipeDelete(el, id) {
        el.style.transform = "translateX(-120%)";
        el.style.opacity = "0";
        setTimeout(async () => {
            const db = await initDB();
            await db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(id);
            renderHistory();
            checkPending();
            document.getElementById('status').innerText = "Record Deleted";
        }, 300);
    }

    async function processBatchQueue() {
        const db = await initDB();
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = async () => {
            const pending = req.result.filter(i => i.status === 'pending');
            if(!pending.length) return;
            document.getElementById('extract-all-btn').disabled = true;
            document.getElementById('p-cont').style.display = 'block';

            for (let item of pending) {
                document.getElementById('preview').src = URL.createObjectURL(item.blob);
                const res = await runExtraction(item.blob);
                if(res) {
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    tx.objectStore(STORE_NAME).put({ 
                        ...item, 
                        text: res.formatted, 
                        direction: res.direction, 
                        duration: res.duration, 
                        status: 'success' 
                    });
                    renderHistory();
                }
            }
            document.getElementById('p-cont').style.display = 'none';
            document.getElementById('extract-all-btn').disabled = false;
            renderHistory();
            checkPending();
        };
    }

    window.addEventListener('load', async () => {
        updateModeUI();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const keys = await cache.keys();
            const mode = localStorage.getItem('txnVaultMode') || 'standard';
            
            for (let key of keys) {
                const resp = await cache.match(key);
                const blob = await resp.blob();
                await cache.delete(key);
                
                if (mode === 'batch') {
                    await saveTxn(blob, "", "", 'pending', null, false);
                } else {
                    document.getElementById('p-cont').style.display = 'block';
                    document.getElementById('preview').src = URL.createObjectURL(blob);
                    const res = await runExtraction(blob);
                    if (res) {
                        await saveTxn(blob, res.formatted, res.direction, 'success', res.duration, false);
                    }
                    document.getElementById('p-cont').style.display = 'none';
                }
            }
            window.history.replaceState({}, '', window.location.pathname);
            renderHistory();
            checkPending();
        } else {
            renderHistory();
        }
    });

    function openModal(img, text) {
        document.getElementById('modal-img').src = img;
        document.getElementById('modal-data').innerText = text;
        document.getElementById('modal').style.display = "flex";
        navigator.clipboard.writeText(text);
    }
    
    function closeModal() { document.getElementById('modal').style.display = "none"; }
    
    async function clearHistory() { 
        if(confirm("Purge All?")) { 
            const db = await initDB();
            await db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).clear();
            renderHistory();
            checkPending();
            document.getElementById('status').innerText = "Database Purged";
        } 
    }
</script>
</body>
</html>
