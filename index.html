<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Txn Vault | Neon</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Remove blue tap box and selection artifacts */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; background: var(--bg-dark); color: #e2e8f0; 
            margin: 0; min-height: 100vh;
        }

        .card { 
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); width: 80%; max-width: 300px; text-align: center; 
        }

        h3 { 
            margin: 0; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Preview area border logic */
        #preview { 
            max-width: 100%; height: auto; border-radius: 16px; margin-top: 20px; display: none; 
            border: 2px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        
        #status-container { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        #status { font-size: 0.85rem; color: #94a3b8; font-family: 'Courier New', monospace; }
        .loader { 
            border: 2px solid rgba(0, 210, 255, 0.1); border-top: 2px solid var(--neon-blue); 
            border-radius: 50%; width: 14px; height: 14px; display: none; 
            animation: spin 0.8s linear infinite; margin-right: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .btn-clear { background: transparent; color: #f87171; border: 1px solid #f87171; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; }

        #history-list { width: 100%; margin-top: 15px; }
        .txn-item { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; 
            padding: 12px; cursor: pointer; user-select: none;
        }
        .txn-thumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .txn-brief { flex: 1; text-align: left; font-size: 0.8rem; color: #cbd5e1; font-family: monospace; }

        /* Modal Layout */
        #modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(2, 6, 23, 0.98); z-index: 1000; 
            flex-direction: column; overflow-y: auto; align-items: center;
        }
        
        /* Fixed Border Logic: width auto + max-width ensures border hugs the image edges */
        #modal-img { 
            width: auto; max-width: 90%; max-height: 50vh; object-fit: contain; 
            margin-top: 60px; border-radius: 16px;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            display: block;
        }
        
        #modal-data { 
            padding: 25px; font-family: 'Courier New', monospace; line-height: 1.8; 
            font-size: 0.95rem; text-align: left; color: var(--neon-blue);
            background: rgba(255,255,255,0.03); margin: 25px; border-radius: 12px;
            cursor: pointer; position: relative; width: 80%; max-width: 300px;
            border: 1px solid var(--glass-border);
        }
        #modal-data::after { content: "TAP TO COPY"; position: absolute; top: 10px; right: 12px; font-size: 0.6rem; color: #64748b; font-family: sans-serif; font-weight: bold; }
        .close-btn { position: fixed; top: 20px; right: 25px; font-size: 2.5rem; color: white; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

<div class="card">
    <h3>Data Core</h3>
    <div id="status-container">
        <div id="loader" class="loader"></div>
        <span id="status">System Online...</span>
    </div>
    <img id="preview" src="" alt="Latest Sync">

    <div class="history-header">
        <h4 style="margin:0; font-size: 0.9rem; color: #64748b; letter-spacing: 1px;">DAILY CACHE</h4>
        <button class="btn-clear" onclick="clearHistory()">WIPE LOGS</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="" alt="Enlarged Image">
    <div id="modal-data" onclick="copyData(event)"></div>
</div>

<script>
    const DB_NAME = "TxnVaultDB";
    const STORE_NAME = "transactions";
    const endpoints = {
        gemini: "https://script.google.com/macros/s/AKfycbyJUcI7u2YjRFzpemfGxXODskItJ-i6Eaz8HKfEF2b5qD2-9dZ2GtEsDmHzt6IaLtDY/exec",
        groq: "https://script.google.com/macros/s/AKfycbx7CrlFktwGnHXRvdcovoXrZAjEGlg5axKnK5a7udfT-NdRwLcQ1xyqOsJ7vW7PUyPj3A/exec"
    };

    const initDB = () => new Promise(res => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => res(e.target.result);
    });

    async function performHousekeeping() {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => {
            const currentISTDate = new Date().toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
            req.result.forEach(item => {
                const itemDate = new Date(item.timestamp).toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
                if (itemDate !== currentISTDate) store.delete(item.id);
            });
            renderHistory();
        };
    }

    async function saveTxn(blob, text) {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).add({ blob, text, timestamp: Date.now() });
        renderHistory();
    }

    async function renderHistory() {
        const db = await initDB();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = () => {
            req.result.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = "txn-item";
                const url = URL.createObjectURL(item.blob);
                div.onclick = () => openModal(url, item.text);
                div.innerHTML = `<img src="${url}" class="txn-thumb"><div class="txn-brief">${item.text.split('\n')[0]}</div>`;
                list.appendChild(div);
            });
        };
    }

    function openModal(imgUrl, fullText) {
        document.getElementById('modal-img').src = imgUrl;
        document.getElementById('modal-data').innerText = fullText;
        document.getElementById('modal').style.display = "flex";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    function copyData(event) {
        event.stopPropagation();
        const text = document.getElementById('modal-data').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const status = document.getElementById('status');
            status.innerText = "COPIED TO CLIPBOARD";
            setTimeout(() => status.innerText = "System Online...", 2000);
        });
    }

    async function processExtraction(blob) {
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        loader.style.display = "inline-block";
        try {
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob);
            });
            for (let model of ['gemini', 'groq']) {
                status.innerText = `SYNCING WITH ${model.toUpperCase()}...`;
                const resp = await fetch(endpoints[model], { method: 'POST', body: JSON.stringify({ image: base64 })});
                const res = await resp.json();
                if (res.status === "success") {
                    const d = res.data;
                    const dirEmoji = d.direction === "IN" ? "🟢 IN" : "🔴 OUT";
                    const formatted = `📱 App: ${d.app}\n👤 Name: ${d.name}\n🆔 ID: ${d.txnId}\n📝 Msg: ${d.imageMessage}\n💰 Amount: ${d.amount}\n📊 Direction: ${dirEmoji}\n⇄ Type: ${d.type}\n🏢 Account: ${d.account}\n🏷️ Category: ${d.category}\n🔗 Ref: ${d.refId}`;
                    
                    await saveTxn(blob, formatted);
                    status.innerText = "DATA DECRYPTED";
                    navigator.clipboard.writeText(formatted); 
                    loader.style.display = "none";
                    return;
                }
            }
        } catch (e) { status.innerText = "LINK FAILURE"; }
        loader.style.display = "none";
    }

    window.addEventListener('load', async () => {
        await performHousekeeping();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const response = await cache.match('shared-image');
            if (response) {
                const blob = await response.blob();
                document.getElementById('preview').src = URL.createObjectURL(blob);
                document.getElementById('preview').style.display = 'block';
                await cache.delete('shared-image');
                processExtraction(blob);
            }
        }
    });

    async function clearHistory() {
        if(!confirm("Purge all logs?")) return;
        const db = await initDB();
        db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).clear();
        renderHistory();
    }
</script>
</body>
</html>
