<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Extractor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f8f9fa; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); width: 100%; max-width: 400px; text-align: center; }
        #preview { width: 100%; border-radius: 12px; margin: 20px 0; display: none; border: 1px solid #eee; }
        select, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; outline: none; }
        select { background-color: #fff; }
        button { background: #007bff; color: white; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Share to Extractor</h2>
    <img id="preview" src="" alt="Shared Image Preview">
    
    <div id="selection-area">
        <label for="model" style="display:block; text-align:left; margin-bottom:5px; font-size:0.85rem; font-weight:bold;">CHOOSE AI MODEL</label>
        <select id="model">
            <option value="">-- Select Model --</option>
            <option value="gemini">Gemini 2.5 Flash</option>
            <option value="Groq">Groq llama-4-scout</option>
        </select>

        <button id="upload-btn" disabled>Confirm & Upload</button>
    </div>
    <div id="results-area" style="display:none; text-align:left; margin-top:20px; padding:15px; background:#f0f7ff; border-radius:12px; border:1px solid #d0e3ff;">
    <h3 style="margin-top:0; font-size:1rem;">Extracted Data</h3>
    <pre id="json-output" style="white-space: pre-wrap; font-size:0.85rem; font-family: monospace;"></pre>
</div>
    <p id="status">Waiting for image share...</p>
</div>

<script>
    const repoPath = '/transaction-extractor/';
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('upload-btn');
    const modelSelect = document.getElementById('model');
    const status = document.getElementById('status');
    let sharedBlob = null;

    // 1. Register Service Worker with specific scope

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: '/transaction-extractor/' })
            .then(reg => {
                console.log("Service Worker registered with scope:", reg.scope);
            })
            .catch(err => {
                console.error("Service Worker registration failed:", err);
            });
    });
}

    // 2. Retrieve Shared Image from Cache on Page Load
    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const response = await cache.match('shared-image');
            if (response) {
                sharedBlob = await response.blob();
                preview.src = URL.createObjectURL(sharedBlob);
                preview.style.display = 'block';
                status.innerText = "Image received! Select a model.";
                await cache.delete('shared-image');
            }
        }
    });

    modelSelect.onchange = () => uploadBtn.disabled = !modelSelect.value;

  uploadBtn.onclick = async () => {
    if (!sharedBlob) return;
    
    const selectedModel = modelSelect.value;
    const resultsArea = document.getElementById('results-area');
    const jsonOutput = document.getElementById('json-output');
    
    status.innerText = "Processing with " + selectedModel + "...";
    uploadBtn.disabled = true;

    const formData = new FormData();
    formData.append('image', sharedBlob);
    formData.append('model', selectedModel);

    // Endpoint Mapping
    const endpoints = {
        'gemini': 'https://your-gemini-backend.com/process',
        'Groq': 'https://your-groq-backend.com/process'
    };

    try {
        const res = await fetch(endpoints[selectedModel], {
            method: 'POST',
            body: formData
        });

        if (res.ok) {
            // 1. Receive the data from backend
            const data = await res.json(); 

            // 2. Display the data in the UI
            status.innerText = "Success! Data extracted.";
            uploadBtn.innerText = "Process Another";
            uploadBtn.disabled = false;
            
            resultsArea.style.display = 'block';
            jsonOutput.innerText = JSON.stringify(data, null, 2);
            
            // Optional: Auto-scroll to results
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        } else {
            status.innerText = "Error: " + res.statusText;
            uploadBtn.disabled = false;
        }
    } catch (e) {
        status.innerText = "Connection error. Check your API endpoints.";
        uploadBtn.disabled = false;
    }
};
</script>
</body>
</html>
