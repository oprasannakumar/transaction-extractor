<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Share Target</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #preview { width: 100%; border-radius: 10px; margin: 15px 0; display: none; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2>Share Target App</h2>
    <img id="preview" src="" alt="Preview">
    
    <label for="model">Select AI Model:</label>
    <select id="model">
        <option value="">-- Choose Model --</option>
        <option value="gemini-1-5">Gemini 2.5 Flash</option>
        <option value="claude-3-5">Groq llama-4-scout</option>
    </select>

    <button id="upload-btn" disabled>Upload to Backend</button>
    <p id="status"></p>
</div>

<script>
    const repoPath = '/REPLACE_WITH_YOUR_REPO_NAME/'; // e.g., '/my-pwa-repo/'
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('upload-btn');
    const modelSelect = document.getElementById('model');
    const status = document.getElementById('status');
    let sharedBlob = null;

    // 1. Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("SW Registered"))
            .catch(err => console.error("SW Registration failed:", err));
    }

    // 2. Retrieve Shared Image from Cache
    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const response = await cache.match('shared-image');
            if (response) {
                sharedBlob = await response.blob();
                preview.src = URL.createObjectURL(sharedBlob);
                preview.style.display = 'block';
                status.innerText = "Image received. Ready for selection.";
                await cache.delete('shared-image'); // Cleanup
            }
        }
    });

    modelSelect.onchange = () => uploadBtn.disabled = !modelSelect.value;

    // 3. Final Upload Logic
    uploadBtn.onclick = async () => {
        status.innerText = "Uploading...";
        const formData = new FormData();
        formData.append('image', sharedBlob);
        formData.append('model', modelSelect.value);

        try {
            // Replace with your actual backend URL
            const res = await fetch('https://your-api-backend.com/upload', {
                method: 'POST',
                body: formData
            });
            if (res.ok) status.innerText = "Success!";
            else status.innerText = "Upload failed.";
        } catch (e) {
            status.innerText = "Error connecting to backend.";
        }
    };
</script>
</body>
</html>
