<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Extractor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f1f3f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #preview { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #eee; }
        
        #status-container { display: flex; align-items: center; justify-content: center; margin: 15px 0; min-height: 24px; }
        #status { font-size: 0.9rem; color: #555; font-weight: 500; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 18px; height: 18px; display: none; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #results-area { display: none; text-align: left; margin-top: 15px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; position: relative; }
        #copy-area { padding: 15px; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; line-height: 1.5; color: #212529; cursor: pointer; }
        .copy-hint { font-size: 0.7rem; color: #007bff; text-align: center; padding-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin: 0 0 15px 0;">Transaction Extractor</h3>
    <img id="preview" src="" alt="Preview">
    
    <div id="status-container">
        <div id="loader" class="loader"></div>
        <span id="status">Waiting for image...</span>
    </div>

    <div id="results-area">
        <div id="copy-area"></div>
        <div class="copy-hint">Tap text to Copy All</div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err));
        });
    }

    const endpoints = {
        gemini: "https://script.google.com/macros/s/AKfycbyJUcI7u2YjRFzpemfGxXODskItJ-i6Eaz8HKfEF2b5qD2-9dZ2GtEsDmHzt6IaLtDY/exec",
        groq: "https://script.google.com/macros/s/AKfycbx7CrlFktwGnHXRvdcovoXrZAjEGlg5axKnK5a7udfT-NdRwLcQ1xyqOsJ7vW7PUyPj3A/exec"
    };

    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const resultsArea = document.getElementById('results-area');
    const copyArea = document.getElementById('copy-area');

    const blobToBase64 = blob => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });

    const processExtraction = async (blob) => {
        loader.style.display = "inline-block";
        resultsArea.style.display = "none";
        
        try {
            const base64Image = await blobToBase64(blob);
            const attemptOrder = ['gemini', 'groq'];

            for (let modelKey of attemptOrder) {
                try {
                    status.innerText = `Analyzing with ${modelKey.toUpperCase()}...`;
                    
                    const response = await fetch(endpoints[modelKey], {
                        method: 'POST',
                        body: JSON.stringify({ image: base64Image })
                    });

                    const result = await response.json();

                    if (result.status === "success") {
                        const d = result.data;
                        const dirEmoji = d.direction === "IN" ? "🟢 IN" : "🔴 OUT";

                        const formattedText = `📅 Date: ${d.date}
📱 App: ${d.app}
👤 Name: ${d.name}
🆔 ID: ${d.txnId}
📝 Msg: ${d.imageMessage}
💰 Amount: ${d.amount}
📊 Direction: ${dirEmoji}
⇄ Type: ${d.type}
🏢 Account: ${d.account}
🏷️ Category: ${d.category}
🔗 Ref: ${d.refId}`;

                        copyArea.innerText = formattedText;
                        resultsArea.style.display = "block";
                        status.innerText = `Success (${modelKey.toUpperCase()}) - Copied!`;

                        await navigator.clipboard.writeText(formattedText);
                        loader.style.display = "none";
                        return; 
                    } else {
                        throw new Error("Parsing failed");
                    }
                } catch (e) {
                    if (modelKey === 'gemini') {
                        status.innerText = "Gemini failed. Switching to Groq...";
                        await new Promise(r => setTimeout(r, 500));
                    } else {
                        status.innerText = "Extraction failed on both models.";
                    }
                }
            }
        } catch (err) {
            status.innerText = "Error processing image.";
        } finally {
            loader.style.display = "none";
        }
    };

    // Auto-trigger on load if shared image exists
    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const response = await cache.match('shared-image');
            if (response) {
                const sharedBlob = await response.blob();
                preview.src = URL.createObjectURL(sharedBlob);
                preview.style.display = 'block';
                await cache.delete('shared-image');
                
                // Automatic trigger
                processExtraction(sharedBlob);
            }
        }
    });

    copyArea.onclick = () => {
        navigator.clipboard.writeText(copyArea.innerText).then(() => {
            const originalText = copyArea.innerText;
            copyArea.innerText = "✅ COPIED TO CLIPBOARD!";
            setTimeout(() => { copyArea.innerText = originalText; }, 1200);
        });
    };
</script>

</body>
</html>
