<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f1f3f5; color: #333; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        #preview { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #eee; }
        
        #status-container { display: flex; align-items: center; justify-content: center; margin: 15px 0; min-height: 24px; }
        #status { font-size: 0.9rem; color: #555; font-weight: 500; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 18px; height: 18px; display: none; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; border-bottom: 2px solid #f1f3f5; padding-bottom: 10px; }
        .btn-clear { background: #ff4757; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; }
        #history-list { width: 100%; margin-top: 15px; }
        
        /* Compact List View */
        .txn-item { background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .txn-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .txn-brief { flex: 1; text-align: left; font-size: 0.85rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* Full Screen Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; overflow-y: auto; color: white; }
        #modal-img { width: 100%; max-height: 60vh; object-fit: contain; margin-top: 20px; }
        #modal-data { padding: 25px; font-family: monospace; line-height: 1.6; font-size: 1rem; text-align: left; background: #1a1a1a; border-radius: 20px 20px 0 0; margin-top: 20px; }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 2rem; color: white; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin: 0;">Transaction Vault</h3>
    <div id="status-container">
        <div id="loader" class="loader"></div>
        <span id="status">Ready...</span>
    </div>
    <img id="preview" src="" alt="Latest Preview">

    <div class="history-header">
        <h4 style="margin: 0;">Today's Log</h4>
        <button class="btn-clear" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="history-list"></div>
</div>

<!-- Enlarge Modal -->
<div id="modal" onclick="closeModal()">
    <span class="close-btn">&times;</span>
    <img id="modal-img" src="" alt="Enlarged Txn">
    <div id="modal-data"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }

    const DB_NAME = "TxnVaultDB";
    const STORE_NAME = "transactions";
    const endpoints = {
        gemini: "https://script.google.com/macros/s/AKfycbyJUcI7u2YjRFzpemfGxXODskItJ-i6Eaz8HKfEF2b5qD2-9dZ2GtEsDmHzt6IaLtDY/exec",
        groq: "https://script.google.com/macros/s/AKfycbx7CrlFktwGnHXRvdcovoXrZAjEGlg5axKnK5a7udfT-NdRwLcQ1xyqOsJ7vW7PUyPj3A/exec"
    };

    const initDB = () => new Promise(res => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => res(e.target.result);
    });

    async function performHousekeeping() {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => {
            const currentISTDate = new Date().toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
            req.result.forEach(item => {
                const itemDate = new Date(item.timestamp).toLocaleDateString('en-GB', { timeZone: 'Asia/Kolkata' });
                if (itemDate !== currentISTDate) store.delete(item.id);
            });
            renderHistory();
        };
    }

    async function saveTxn(blob, text) {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).add({ blob, text, timestamp: Date.now() });
        renderHistory();
    }

    async function renderHistory() {
        const db = await initDB();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = () => {
            req.result.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = "txn-item";
                const url = URL.createObjectURL(item.blob);
                div.onclick = () => openModal(url, item.text);
                div.innerHTML = `<img src="${url}" class="txn-thumb"><div class="txn-brief">${item.text.split('\n')[0]}...</div>`;
                list.appendChild(div);
            });
        };
    }

    function openModal(imgUrl, fullText) {
        document.getElementById('modal-img').src = imgUrl;
        document.getElementById('modal-data').innerText = fullText;
        document.getElementById('modal').style.display = "flex";
        // Auto-copy on open
        navigator.clipboard.writeText(fullText);
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    async function processExtraction(blob) {
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        loader.style.display = "inline-block";
        try {
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob);
            });
            for (let model of ['gemini', 'groq']) {
                status.innerText = `Using ${model.toUpperCase()}...`;
                const resp = await fetch(endpoints[model], { method: 'POST', body: JSON.stringify({ image: base64 })});
                const res = await resp.json();
                if (res.status === "success") {
                    const d = res.data;
                    const dirEmoji = d.direction === "IN" ? "🟢 IN" : "🔴 OUT";
                    const formatted = `📱 App: ${d.app}
👤 Name: ${d.name}
🆔 ID: ${d.txnId}
📝 Msg: ${d.imageMessage}
💰 Amount: ${d.amount}
📊 Direction: ${dirEmoji}
⇄ Type: ${d.type}
🏢 Account: ${d.account}
🏷️ Category: ${d.category}
🔗 Ref: ${d.refId}`;
                    await saveTxn(blob, formatted);
                    status.innerText = "Success! Copied.";
                    loader.style.display = "none";
                    return;
                }
            }
        } catch (e) { status.innerText = "Error."; }
        loader.style.display = "none";
    }

    window.addEventListener('load', async () => {
        await performHousekeeping();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('shared')) {
            const cache = await caches.open('shared-data');
            const response = await cache.match('shared-image');
            if (response) {
                const blob = await response.blob();
                document.getElementById('preview').src = URL.createObjectURL(blob);
                document.getElementById('preview').style.display = 'block';
                await cache.delete('shared-image');
                processExtraction(blob);
            }
        }
    });

    async function clearHistory() {
        if(!confirm("Clear today's logs?")) return;
        const db = await initDB();
        db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).clear();
        renderHistory();
    }
</script>
</body>
</html>
